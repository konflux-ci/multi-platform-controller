name: Validate PR - agent files protection
on:
  pull_request_target:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    branches: [main]
permissions:
  contents: read
  pull-requests: read
jobs:
  check-agent-files:
    name: Check agent file changes
    runs-on: ubuntu-latest
    steps:
      - name: Verify agent file modifications
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const perPage = 100;

            const protectedPaths = [
              'CLAUDE.md',
              'AGENTS.md',
              'GEMINI.md',
            ];
            const protectedPrefixes = [
              'skills/',
              '.claude/',
            ];

            // Step 1: Get all changed files (paginated)
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: perPage,
            });

            // Step 2: Match against protected paths
            const modifiedAgentFiles = files
              .map(f => f.filename)
              .filter(filename =>
                protectedPaths.includes(filename) ||
                protectedPrefixes.some(prefix => filename.startsWith(prefix))
              );

            // Step 3: No matches → pass
            if (modifiedAgentFiles.length === 0) {
              console.log('No agent files modified, skipping check.');
              return;
            }

            console.log(`Modified agent files:\n${modifiedAgentFiles.map(f => `  - ${f}`).join('\n')}`);

            // Helper: check team membership
            async function isTeamMember(username) {
              const response = await github.request('GET /orgs/{org}/teams/{team_slug}/memberships/{username}', {
                org: 'konflux-ci',
                team_slug: 'infrastructure',
                username: username,
              }).catch(e => e);

              if (response.status === 200) {
                return response.data.state === 'active';
              }
              if (response.status === 404) {
                return false;
              }
              core.setFailed(
                `Team membership check for @${username} failed with HTTP ${response.status}: ${response.message}`
              );
              return false;
            }

            // Step 4-5: Check PR author membership
            const prAuthor = context.payload.pull_request.user.login;
            if (await isTeamMember(prAuthor)) {
              console.log(`PR author @${prAuthor} is a member of konflux-ci/infrastructure. Approved.`);
              return;
            }

            console.log(`PR author @${prAuthor} is not a member of konflux-ci/infrastructure.`);

            // Step 6: Check for agent-files-approved label
            const labels = context.payload.pull_request.labels.map(l => l.name);
            if (!labels.includes('agent-files-approved')) {
              const fileList = modifiedAgentFiles.map(f => `- ${f}`).join('\n');
              core.setFailed(
                `This PR modifies agent/skill files which are maintained by the Infrastructure team of the konflux-ci organization.\n\n` +
                `To proceed:\n` +
                `1. Request a review from a member of @konflux-ci/infrastructure\n` +
                `2. They will review your changes and apply the 'agent-files-approved' label if appropriate\n` +
                `3. This check will re-run automatically when the label is applied\n\n` +
                `Modified agent files:\n${fileList}`
              );
              return;
            }

            // Step 8-9: Label exists, verify who applied it (paginated)
            const events = await github.paginate(github.rest.issues.listEvents, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              per_page: perPage,
            });

            // Find the last 'labeled' event for 'agent-files-approved'
            const labelEvents = events.filter(
              e => e.event === 'labeled' && e.label?.name === 'agent-files-approved'
            );

            if (labelEvents.length === 0) {
              core.setFailed(
                `The 'agent-files-approved' label is present but no label event was found. ` +
                `Please remove and re-apply the label.`
              );
              return;
            }

            const lastLabelEvent = labelEvents[labelEvents.length - 1];
            const applier = lastLabelEvent.actor.login;

            // Step 10-11: Check applier's team membership
            if (await isTeamMember(applier)) {
              console.log(`Label 'agent-files-approved' was applied by @${applier}, a member of konflux-ci/infrastructure. Approved.`);
              return;
            }

            core.setFailed(
              `The 'agent-files-approved' label was applied by @${applier}, who is not a member of the konflux-ci/infrastructure team. ` +
              `Only Infrastructure team members can approve agent file changes.`
            );
