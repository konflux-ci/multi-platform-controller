name: Dependency Impact Analysis

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: dep-triage-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  triage:
    name: Triage dependency PR
    if: >-
      github.event.pull_request.user.login == 'renovate[bot]' ||
      github.event.pull_request.user.login == 'red-hat-konflux[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      checks: read
      statuses: read
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: konflux-ci/deptriage@993b534180800943a8c05601151fb34ecb376445 # main
        with:
          command: both
          pr-number: ${{ github.event.pull_request.number }}
          api-key: ${{ secrets.GEMINI_API_KEY }}
          llm-provider: gemini
          auto-approve: 'true'
          auto-merge: 'true'
