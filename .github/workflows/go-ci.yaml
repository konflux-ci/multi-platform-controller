name: Validate PR - golang CI
on:
  pull_request:
    branches: [ main ]
  merge_group:
    types: [checks_requested]
permissions:
  checks: read
  contents: read
  actions: write
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: './go.mod'
      - name: Determine golang-ci version
        id: golangci_version
        run: |
          echo "version=$(grep 'GOLANGCI_LINT_VERSION ?=' Makefile | sed -e 's:GOLANGCI_LINT_VERSION ?= \(.*\):\1:' -)" \
            >> $GITHUB_OUTPUT
      - name: Lint with golang-ci
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9
        with:
          version: ${{ steps.golangci_version.outputs.version }}
          args: "--timeout=10m --build-tags='normal periodic' --output.sarif.path=out/go-lint.sarif"
      - name: Upload sarif report
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        if: ${{ always() && github.event_name != 'merge_group' }}
        with:
          sarif_file: out/go-lint.sarif
  go:
    name: Check sources
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: './go.mod'
      - name: Check go mod status
        run: |
          go mod tidy
          if [[ ! -z $(git status -s) ]]
          then
            echo "Go mod state is not clean:"
            git --no-pager diff
            exit 1
          fi
      - name: Check format
        env:
          FMT_ARGS: --diff
        run: |
          make fmt
